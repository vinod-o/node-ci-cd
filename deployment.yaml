apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodejs-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nodejs-app
  template:
    metadata:
      labels:
        app: nodejs-app
    spec:
      containers:
        - name: node-image
          image:
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: "100m"
              memory: "126Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
